{% extends "base.html" %}
{% block title %}GTKY – Admin{% endblock %}
{% block content %}
<div style="max-width:320px; margin:2rem auto;">
  <h2>Admin</h2>
  {% if error %}<p style="color:var(--pico-del-color);">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login">
    <input type="password" name="pin" placeholder="PIN" required autofocus>
    <button type="submit" style="width:100%;">{{ 'Entrar' if lang == 'es' else 'Enter' }}</button>
  </form>
  <div style="margin-top:1rem;"><a href="/">← {{ 'Inicio' if lang == 'es' else 'Home' }}</a></div>
</div>
{% endblock %}
